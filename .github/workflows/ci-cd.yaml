name: ShopKube CI/CD Pipeline

on:
  push:
    branches:
      - master   # 🔥 master branch trigger

jobs:

  # ─── JOB 1: TEST ─────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run basic tests
        run: |
          echo "Running tests..."
          ls src/
          echo "Tests passed!"

  # ─── JOB 2: BUILD + PUSH ─────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'   # 🔥 master condition

    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="sha-${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopkube:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shopkube:latest

  # ─── JOB 3: UPDATE MANIFESTS ─────────────────
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'   # 🔥 master condition

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/shopkube-manifests
          token: ${{ secrets.MANIFESTS_TOKEN }}
          path: shopkube-manifests

      - name: Update image tag
        run: |
          cd shopkube-manifests
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "New image: $USER/shopkube:$IMAGE_TAG"

          sed -i \
            "s|image: $USER/shopkube:.*|image: $USER/shopkube:$IMAGE_TAG|" \
            apps/shopkube/02-deployment.yaml

          grep "image:" apps/shopkube/02-deployment.yaml

      - name: Commit & push
        run: |
          cd shopkube-manifests
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add apps/shopkube/02-deployment.yaml

          git commit -m "ci: update image to ${{ needs.build.outputs.image-tag }}" || echo "No changes"

          git push

          echo "ArgoCD will sync automatically 🚀"
